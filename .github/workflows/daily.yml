name: Daily Policy Digest

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install dependencies
        run: npm install puppeteer-core

      - name: Scrape policies and send email
        run: node scripts/scrape-and-send.js
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          MOFCOM_URL: ${{ vars.MOFCOM_URL || 'https://www.mofcom.gov.cn/zwgk/zcfb/index.html' }}
